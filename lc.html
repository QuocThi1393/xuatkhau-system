<div class="topbar">
  <div class="topbar-logo"><a href="index.html">Xuất Khẩu <span>System</span></a></div>
  <a href="index.html" title="Về trang chủ" style="flex-shrink:0;line-height:0">
  <svg width="280" height="52" viewBox="0 0 280 52">

    <text x="140" y="43" font-family="Arial, sans-serif" font-size="8" fill="#D4EDDA" text-anchor="middle" letter-spacing="1.5">TOMIYA SUMMIT GARMENT EXPORT</text>

<div class="container">
  <!-- Danh sách 4 khách LC -->
  <div id="lc-customers-view">
    <div class="toolbar">
      <span style="font-size:15px;font-weight:500">Quản lý LC theo khách hàng</span>

    <div id="lc-customer-cards" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:14px"></div>

  <!-- Lịch sử LC của 1 khách -->
  <div id="lc-history-view" style="display:none">
    <div class="toolbar">
      <div class="toolbar-left">
        <button class="btn btn-sm" onclick="backToCustomers()"><i class="ti ti-arrow-left"></i> Quay lại</button>
        <span id="lc-history-title" style="font-size:16px;font-weight:500"></span>
      </div>
      <div class="toolbar-right">
        <button class="btn btn-primary" id="btn-add-lc" style="display:none"><i class="ti ti-plus"></i> Thêm LC mới</button>
      </div>
    </div>
    <div id="lc-history-list"></div>
  </div>
</div>

<!-- MODAL: Thêm/sửa LC -->
<div class="modal-backdrop" id="modal-lc">
  <div class="modal" style="max-width:560px">
    <div class="modal-title">
      <span id="lc-modal-title">Thêm LC</span>
      <span class="modal-close" onclick="closeModalById('modal-lc')"><i class="ti ti-x"></i></span>
    </div>
    <form id="form-lc">
      <div class="form-row">
        <div class="form-group"><label class="form-label">Tên LC (Số LC) *</label><input class="form-input" id="fl-name" required></div>
        <div class="form-group" id="fl-amendname-wrap" style="display:none"><label class="form-label">Tên bản Amend</label><input class="form-input" id="fl-amendname" placeholder="Amend 1, Amend 2..."></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label class="form-label">Ngày phát hành</label><input type="date" class="form-input" id="fl-issue"></div>
        <div class="form-group"><label class="form-label" id="fl-amount-label">Amount (USD) *</label><input type="number" step="any" class="form-input" id="fl-amount" required></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label class="form-label">Hạn LC</label><input type="date" class="form-input" id="fl-expiry"></div>
        <div class="form-group"><label class="form-label">Hạn giao hàng (ETD)</label><input type="date" class="form-input" id="fl-shipdate"></div>
      </div>
      <div class="form-group"><label class="form-label">Ghi chú</label><textarea class="form-textarea" id="fl-note" rows="2"></textarea></div>
      <div id="fl-hint" style="font-size:12px;color:var(--text-muted);background:var(--bg-secondary);padding:8px 12px;border-radius:var(--radius-md)">
        💡 Thêm LC mới sẽ tự động chuyển LC cũ (đang hoạt động) thành "Đã kết thúc".
      </div>
      <div class="form-footer">
        <button type="button" class="btn" onclick="closeModalById('modal-lc')">Hủy</button>
        <button type="submit" class="btn btn-primary"><i class="ti ti-check"></i> Lưu</button>
      </div>
    </form>
  </div>
</div>

<!-- MODAL: Thêm INV nhập tay -->
<div class="modal-backdrop" id="modal-addinv">
  <div class="modal" style="max-width:420px">
    <div class="modal-title">
      Thêm INV (nhập tay)
      <span class="modal-close" onclick="closeModalById('modal-addinv')"><i class="ti ti-x"></i></span>
    </div>
    <form id="form-addinv">
      <div class="form-group"><label class="form-label">Số INV *</label><input class="form-input" id="fi-invno" required placeholder="858/26-NPT"></div>
      <div class="form-row">
        <div class="form-group"><label class="form-label">Ngày INV</label><input type="date" class="form-input" id="fi-date"></div>
        <div class="form-group"><label class="form-label">Số tiền (USD) *</label><input type="number" step="any" class="form-input" id="fi-amount" required></div>
      </div>
      <div class="form-footer">
        <button type="button" class="btn" onclick="closeModalById('modal-addinv')">Hủy</button>
        <button type="submit" class="btn btn-primary"><i class="ti ti-check"></i> Thêm</button>
      </div>
    </form>
  </div>
</div>

<!-- MODAL: Đăng nhập -->
<div class="modal-backdrop" id="modal-login">
  <div class="modal" style="max-width:360px">
    <div class="modal-title">Đăng nhập Admin <span class="modal-close" onclick="closeModalById('modal-login')"><i class="ti ti-x"></i></span></div>
    <div class="form-group"><label class="form-label">Mật khẩu</label><input type="password" class="form-input" id="f-admin-pw"></div>
    <div id="login-error" style="color:var(--red-text);font-size:12px;margin-bottom:8px;display:none">Sai mật khẩu!</div>
    <div class="form-footer">
      <button type="button" class="btn" onclick="closeModalById('modal-login')">Hủy</button>
      <button type="button" class="btn btn-primary" id="btn-do-login"><i class="ti ti-login"></i> Đăng nhập</button>
    </div>
  </div>
</div>

<div style="position:fixed;right:10px;bottom:6px;font-size:11px;color:#9a9a9a;z-index:5;pointer-events:none">© 2026 Nguyen Quoc Thi. All rights reserved. (Version 1.0.0)</div>
<div id="toast" class="toast"></div>

<script type="module">
import { db } from "./js/firebase-config.js";
import { isAdmin, loginAdmin, logoutAdmin } from "./js/auth.js";
import { showToast, openModal, closeModal, formatDate } from "./js/utils.js";
import {
  collection, addDoc, onSnapshot, doc, updateDoc, deleteDoc, serverTimestamp, query, orderBy
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

window.closeModalById = closeModal;

// 4 khách LC cố định + màu + link khách hàng
const LC_CUSTOMERS = [
  { key:"MITSUWA",   color:"#E15554", linkedCustomer:"MITSUWA" },
  { key:"SANMARINO", color:"#3BB273", linkedCustomer:"SANMARINO" },
  { key:"NPT",       color:"#4D9DE0", linkedCustomer:"HEMD (OGITA)" },
  { key:"ACROS",     color:"#E1A731", linkedCustomer:"ACROS" },
];

let allLC = [];        // tất cả LC
let allShipments = []; // để tính INV
let currentLcKey = null;

function updateAdminUI() {
  const admin = isAdmin();
  document.getElementById("admin-indicator").style.display = admin ? "flex" : "none";
  document.getElementById("login-label").textContent = admin ? "Đăng xuất" : "Đăng nhập";
  document.getElementById("btn-add-lc").style.display = (admin && currentLcKey) ? "flex" : "none";
  renderCustomerCards();
  if (currentLcKey) renderHistory(currentLcKey);
}
document.getElementById("btn-login-toggle").addEventListener("click", () => {
  if (isAdmin()) { logoutAdmin(); showToast("Đã đăng xuất"); updateAdminUI(); }
  else openModal("modal-login");
});
document.getElementById("btn-do-login").addEventListener("click", () => {
  if (loginAdmin(document.getElementById("f-admin-pw").value)) {
    closeModal("modal-login"); document.getElementById("f-admin-pw").value="";
    document.getElementById("login-error").style.display="none";
    showToast("Đăng nhập thành công!"); updateAdminUI();
  } else document.getElementById("login-error").style.display="block";
});

function renderCustomerCards() {
  const box = document.getElementById("lc-customer-cards");
  box.innerHTML = LC_CUSTOMERS.map(lc => {
    const count = allLC.filter(x=>x.lcKey===lc.key).length;
    const today = new Date(); today.setHours(0,0,0,0);
    const active = allLC.find(x=>{
      if (x.lcKey!==lc.key || x.status==="ended") return false;
      const eff = getEffectiveLC(x);
      const expired = eff.expiry && new Date(eff.expiry) < today;
      return !expired;
    });
    return `<div class="shipment-card" style="cursor:pointer;border-top:4px solid ${lc.color}" onclick="openHistory('${lc.key}')">
      <div style="padding:16px">
        <div style="font-size:17px;font-weight:600;color:${lc.color}">${lc.key}</div>
        <div style="font-size:11px;color:var(--text-muted);margin-top:2px">Khách: ${lc.linkedCustomer}</div>
        <div style="margin-top:10px;font-size:12px">
          <div>${count} LC trong lịch sử</div>
          ${active?`<div style="margin-top:4px;color:var(--green-text)"><b>Đang hoạt động:</b> ${active.name}</div>`:`<div style="margin-top:4px;color:var(--text-muted)">Chưa có LC hoạt động</div>`}
        </div>
      </div>
    </div>`;
  }).join("");
}

window.openHistory = function(key) {
  currentLcKey = key;
  document.getElementById("lc-customers-view").style.display = "none";
  document.getElementById("lc-history-view").style.display = "block";
  const lc = LC_CUSTOMERS.find(x=>x.key===key);
  document.getElementById("lc-history-title").textContent = `Lịch sử LC — ${key} (${lc.linkedCustomer})`;
  document.getElementById("btn-add-lc").style.display = isAdmin() ? "flex" : "none";
  renderHistory(key);
};
window.backToCustomers = function() {
  currentLcKey = null;
  document.getElementById("lc-history-view").style.display = "none";
  document.getElementById("lc-customers-view").style.display = "block";
};

// Tính INV tự động cho 1 LC: các lô đã làm tờ khai (bước 8), khách = linkedCustomer, INV nằm trong [ngày phát hành, hạn LC]
function getInvoicesForLC(lcObj) {
  const lcDef = LC_CUSTOMERS.find(x=>x.key===lcObj.lcKey);
  if (!lcDef) return [];
  const linked = lcDef.linkedCustomer;
  return allShipments.filter(s => {
    const exported = (s.checklist||{})[8]==="done" || (s.checklist||{})[8]==="skip";
    if (!exported) return false;
    const custs = (s.orders||[]).map(o=>o.customer);
    if (!custs.includes(linked)) return false;
    // chỉ tính nếu lô gắn với LC này (theo lcId nếu có, hoặc đang hoạt động)
    return s.lcId === lcObj.id;
  }).map(s => {
    const amount = (s.orders||[]).reduce((a,o)=>a+Math.round((parseFloat(o.qty)||0)*(parseFloat(o.unitPrice)||0)*100)/100, 0);
    return { invoiceNo: s.invoiceNo||s.booking||"—", date: s.stuffingDate, amount: Math.round(amount*100)/100 };
  });
}

// Tính thông tin LC hiệu lực: tổng tiền (gốc + các amend), hạn mới nhất
function getEffectiveLC(lc) {
  const amends = lc.amendments || [];
  let totalAmount = parseFloat(lc.amount)||0;
  let expiry = lc.expiry, shipDate = lc.shipDate;
  amends.forEach(a => {
    totalAmount += parseFloat(a.addAmount)||0;
    if (a.expiry) expiry = a.expiry;       // amend mới nhất ghi đè hạn
    if (a.shipDate) shipDate = a.shipDate;
  });
  return { totalAmount: Math.round(totalAmount*100)/100, expiry, shipDate };
}

function renderHistory(key) {
  const list = allLC.filter(x=>x.lcKey===key).sort((a,b)=>(b.issueDate||"").localeCompare(a.issueDate||""));
  const cont = document.getElementById("lc-history-list");
  const admin = isAdmin();
  if (!list.length) {
    cont.innerHTML = `<div class="empty-state"><i class="ti ti-credit-card"></i><p>Chưa có LC nào</p></div>`;
    return;
  }
  cont.innerHTML = list.map(lc => {
    const autoInvoices = getInvoicesForLC(lc).map(i=>({...i, manual:false}));
    const manualInvoices = (lc.manualInvoices||[]).map((i,idx)=>({...i, manual:true, idx}));
    const invoices = [...manualInvoices, ...autoInvoices];
    const usedAmount = invoices.reduce((a,i)=>a+(parseFloat(i.amount)||0), 0);
    const eff = getEffectiveLC(lc);
    const totalLC = eff.totalAmount;
    const remaining = Math.round((totalLC - usedAmount)*100)/100;
    const amends = lc.amendments || [];

    // Trạng thái động: ended nếu (a) bị đánh dấu ended (do có LC mới) hoặc (b) quá hạn hiệu lực
    const today = new Date(); today.setHours(0,0,0,0);
    const expired = eff.expiry && new Date(eff.expiry) < today;
    const isEnded = lc.status === "ended" || expired;
    const statusBadge = !isEnded
      ? `<span class="badge badge-green">Đang hoạt động</span>`
      : (expired && lc.status!=="ended"
          ? `<span class="badge badge-gray">Hết hạn (${formatDate(eff.expiry)})</span>`
          : `<span class="badge badge-gray">Đã kết thúc</span>`);
    const invRows = invoices.length ? invoices.map((i)=>`
      <tr>
        <td>${i.invoiceNo} ${i.manual?'<span style="font-size:9px;color:var(--blue-text)">(tay)</span>':''}</td>
        <td>${formatDate(i.date)||"—"}</td>
        <td style="text-align:right">${(parseFloat(i.amount)||0).toLocaleString(undefined,{minimumFractionDigits:2})}</td>
        <td style="text-align:center;width:30px">${(i.manual && isAdmin())?`<button onclick="deleteManualInv('${lc.id}',${i.idx})" style="border:none;background:none;cursor:pointer;color:var(--red-text)">✕</button>`:''}</td>
      </tr>
    `).join("") : `<tr><td colspan="4" style="color:var(--text-muted);text-align:center">Chưa có INV nào</td></tr>`;

    // Lịch sử amend
    const amendHTML = amends.length ? `
      <div style="margin-top:12px">
        <div style="font-size:11px;font-weight:500;color:var(--text-muted);margin-bottom:4px">LỊCH SỬ TU CHỈNH (AMEND):</div>
        <table class="data-table" style="font-size:11px">
          <thead><tr><th>Bản</th><th>Ngày</th><th style="text-align:right">Tăng tiền</th><th>Hạn LC mới</th><th>Hạn giao mới</th><th>Ghi chú</th>${admin?'<th></th>':''}</tr></thead>
          <tbody>
            <tr style="background:#fafafa"><td>Gốc</td><td>${formatDate(lc.issueDate)||"—"}</td><td style="text-align:right">${(parseFloat(lc.amount)||0).toLocaleString(undefined,{minimumFractionDigits:2})}</td><td>${formatDate(lc.expiry)||"—"}</td><td>${formatDate(lc.shipDate)||"—"}</td><td>${lc.note||""}</td>${admin?'<td></td>':''}</tr>
            ${amends.map((a,ai)=>`<tr>
              <td>${a.name||`Amend ${ai+1}`}</td>
              <td>${formatDate(a.issueDate)||"—"}</td>
              <td style="text-align:right;color:var(--green-text)">+${(parseFloat(a.addAmount)||0).toLocaleString(undefined,{minimumFractionDigits:2})}</td>
              <td>${formatDate(a.expiry)||"—"}</td>
              <td>${formatDate(a.shipDate)||"—"}</td>
              <td>${a.note||""}</td>
              ${admin?`<td style="text-align:center"><button onclick="deleteAmend('${lc.id}',${ai})" style="border:none;background:none;cursor:pointer;color:var(--red-text)">✕</button></td>`:''}
            </tr>`).join("")}
          </tbody>
        </table>
      </div>` : "";

    return `<div class="shipment-card" style="margin-bottom:14px">
      <div style="padding:16px">
        <div style="display:flex;justify-content:space-between;align-items:flex-start">
          <div>
            <div style="font-size:15px;font-weight:600">${lc.name} ${statusBadge}${amends.length?`<span class="badge badge-blue" style="margin-left:4px">${amends.length} amend</span>`:""}</div>
            <div style="font-size:12px;color:var(--text-muted);margin-top:2px">Phát hành: ${formatDate(lc.issueDate)||"—"}</div>
          </div>
          ${admin?`<div style="display:flex;gap:6px">
            ${lc.status==="ended"?`<button class="btn btn-sm" onclick="reactivateLC('${lc.id}')" title="Kích hoạt lại"><i class="ti ti-rotate"></i></button>`:""}
            <button class="btn btn-sm" onclick="openAddAmend('${lc.id}')" title="Thêm bản tu chỉnh"><i class="ti ti-file-plus"></i> Amend</button>
            <button class="btn btn-sm" onclick="editLC('${lc.id}')" title="Sửa bản gốc"><i class="ti ti-edit"></i></button>
            <button class="btn btn-sm btn-danger" onclick="deleteLC('${lc.id}')"><i class="ti ti-trash"></i></button>
          </div>`:""}
        </div>
        <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-top:12px;font-size:12px">
          <div><div style="color:var(--text-muted)">Tổng LC${amends.length?" (gốc+amend)":""}</div><div style="font-weight:600">${totalLC.toLocaleString(undefined,{minimumFractionDigits:2})} USD</div></div>
          <div><div style="color:var(--text-muted)">Đã dùng</div><div style="font-weight:500;color:var(--amber-text)">${usedAmount.toLocaleString(undefined,{minimumFractionDigits:2})} USD</div></div>
          <div><div style="color:var(--text-muted)">Còn lại</div><div style="font-weight:600;color:${remaining<0?'var(--red-text)':'var(--green-text)'}">${remaining.toLocaleString(undefined,{minimumFractionDigits:2})} USD</div></div>
          <div><div style="color:var(--text-muted)">Hạn LC / Giao (hiệu lực)</div><div style="font-weight:500">${formatDate(eff.expiry)||"—"} / ${formatDate(eff.shipDate)||"—"}</div></div>
        </div>
        ${amendHTML}
        <div style="margin-top:12px">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">
            <div style="font-size:11px;font-weight:500;color:var(--text-muted)">DANH SÁCH INV ĐÃ TRỪ:</div>
            ${admin?`<button class="btn btn-sm" onclick="openAddInv('${lc.id}')" style="padding:2px 8px;font-size:11px"><i class="ti ti-plus"></i> Thêm INV (nhập tay)</button>`:""}
          </div>
          <table class="data-table" style="font-size:11px">
            <thead><tr><th>Inv No.</th><th>Ngày Inv</th><th style="text-align:right">Số tiền (USD)</th><th></th></tr></thead>
            <tbody>${invRows}</tbody>
          </table>
        </div>
      </div>
    </div>`;
  }).join("");
}

// formMode: "add" | "edit" | "amend"
let formMode = "add";
let formLcId = null;

document.getElementById("btn-add-lc").addEventListener("click", () => {
  formMode = "add"; formLcId = null;
  document.getElementById("lc-modal-title").textContent = `Thêm LC mới — ${currentLcKey}`;
  document.getElementById("form-lc").reset();
  document.getElementById("fl-name").readOnly = false;
  document.getElementById("fl-amendname-wrap").style.display = "none";
  document.getElementById("fl-amount-label").textContent = "Amount (USD) *";
  document.getElementById("fl-hint").style.display = "block";
  openModal("modal-lc");
});

window.editLC = function(id) {
  const lc = allLC.find(x=>x.id===id);
  if (!lc) return;
  formMode = "edit"; formLcId = id;
  document.getElementById("lc-modal-title").textContent = "Sửa LC (bản gốc)";
  document.getElementById("fl-name").value = lc.name||"";
  document.getElementById("fl-name").readOnly = false;
  document.getElementById("fl-amendname-wrap").style.display = "none";
  document.getElementById("fl-amount-label").textContent = "Amount (USD) *";
  document.getElementById("fl-issue").value = lc.issueDate||"";
  document.getElementById("fl-amount").value = lc.amount||"";
  document.getElementById("fl-expiry").value = lc.expiry||"";
  document.getElementById("fl-shipdate").value = lc.shipDate||"";
  document.getElementById("fl-note").value = lc.note||"";
  document.getElementById("fl-hint").style.display = "none";
  openModal("modal-lc");
};

window.openAddAmend = function(id) {
  const lc = allLC.find(x=>x.id===id);
  if (!lc) return;
  formMode = "amend"; formLcId = id;
  const amendCount = (lc.amendments||[]).length;
  document.getElementById("lc-modal-title").textContent = `Thêm Amend cho ${lc.name}`;
  document.getElementById("form-lc").reset();
  document.getElementById("fl-name").value = lc.name||"";
  document.getElementById("fl-name").readOnly = true;  // khóa số LC
  document.getElementById("fl-amendname-wrap").style.display = "block";
  document.getElementById("fl-amendname").value = `Amend ${amendCount+1}`;
  document.getElementById("fl-amount-label").textContent = "Số tiền tăng thêm (USD)";
  document.getElementById("fl-amount").value = "";
  document.getElementById("fl-amount").required = false;
  // điền sẵn hạn hiện tại để dễ sửa
  const eff = getEffectiveLC(lc);
  document.getElementById("fl-expiry").value = eff.expiry||"";
  document.getElementById("fl-shipdate").value = eff.shipDate||"";
  document.getElementById("fl-hint").style.display = "none";
  openModal("modal-lc");
};

document.getElementById("form-lc").addEventListener("submit", async e => {
  e.preventDefault();
  const name = document.getElementById("fl-name").value.trim();
  const issueDate = document.getElementById("fl-issue").value||null;
  const amount = parseFloat(document.getElementById("fl-amount").value)||0;
  const expiry = document.getElementById("fl-expiry").value||null;
  const shipDate = document.getElementById("fl-shipdate").value||null;
  const note = document.getElementById("fl-note").value.trim();

  try {
    if (formMode === "amend") {
      const lc = allLC.find(x=>x.id===formLcId);
      const amendName = document.getElementById("fl-amendname").value.trim() || `Amend ${(lc.amendments||[]).length+1}`;
      const newAmend = { name: amendName, issueDate, addAmount: amount, expiry, shipDate, note };
      const amendments = [...(lc.amendments||[]), newAmend];
      await updateDoc(doc(db,"lc",formLcId), { amendments });
      showToast("Đã thêm bản Amend!");
    } else if (formMode === "edit") {
      await updateDoc(doc(db,"lc",formLcId), { name, issueDate, amount, expiry, shipDate, note });
      showToast("Đã cập nhật LC!");
    } else { // add
      const actives = allLC.filter(x=>x.lcKey===currentLcKey && x.status==="active");
      for (const a of actives) await updateDoc(doc(db,"lc",a.id), { status:"ended" });
      await addDoc(collection(db,"lc"), {
        lcKey: currentLcKey, name, issueDate, amount, expiry, shipDate, note,
        amendments: [], status:"active", createdAt: serverTimestamp()
      });
      showToast("Đã thêm LC mới! LC cũ chuyển sang Đã kết thúc.");
    }
    closeModal("modal-lc");
    document.getElementById("fl-name").readOnly = false;
    document.getElementById("fl-amount").required = true;
    formMode = "add"; formLcId = null;
  } catch(err){ showToast("Lỗi: "+err.message); }
});

let addInvLcId = null;
window.openAddInv = function(lcId) {
  addInvLcId = lcId;
  document.getElementById("form-addinv").reset();
  openModal("modal-addinv");
};
document.getElementById("form-addinv").addEventListener("submit", async e => {
  e.preventDefault();
  const lc = allLC.find(x=>x.id===addInvLcId);
  if (!lc) return;
  const newInv = {
    invoiceNo: document.getElementById("fi-invno").value.trim(),
    date: document.getElementById("fi-date").value||null,
    amount: parseFloat(document.getElementById("fi-amount").value)||0,
  };
  const manualInvoices = [...(lc.manualInvoices||[]), newInv];
  await updateDoc(doc(db,"lc",addInvLcId), { manualInvoices });
  closeModal("modal-addinv");
  showToast("Đã thêm INV vào LC!");
});
window.deleteManualInv = async function(lcId, idx) {
  const lc = allLC.find(x=>x.id===lcId);
  if (!lc) return;
  if (!confirm("Xóa INV này?")) return;
  const manualInvoices = (lc.manualInvoices||[]).filter((_,i)=>i!==idx);
  await updateDoc(doc(db,"lc",lcId), { manualInvoices });
  showToast("Đã xóa INV!");
};

window.reactivateLC = async function(id) {
  if (!confirm("Kích hoạt lại LC này? Các LC khác đang hoạt động của khách sẽ được chuyển thành kết thúc.")) return;
  const lc = allLC.find(x=>x.id===id);
  if (!lc) return;
  // ngừng các LC active khác cùng khách
  const actives = allLC.filter(x=>x.lcKey===lc.lcKey && x.status!=="ended" && x.id!==id);
  for (const a of actives) await updateDoc(doc(db,"lc",a.id), { status:"ended" });
  await updateDoc(doc(db,"lc",id), { status:"active" });
  showToast("Đã kích hoạt lại LC!");
};

window.deleteAmend = async function(lcId, idx) {
  const lc = allLC.find(x=>x.id===lcId);
  if (!lc) return;
  if (!confirm("Xóa bản amend này?")) return;
  const amendments = (lc.amendments||[]).filter((_,i)=>i!==idx);
  await updateDoc(doc(db,"lc",lcId), { amendments });
  showToast("Đã xóa amend!");
};

window.deleteLC = async function(id) {
  if (!confirm("Xóa LC này?")) return;
  await deleteDoc(doc(db,"lc",id));
  showToast("Đã xóa LC!");
};

// Realtime
onSnapshot(query(collection(db,"shipments"), orderBy("createdAt","desc")), snap => {
  allShipments = snap.docs.map(d=>({id:d.id,...d.data()}));
  if (currentLcKey) renderHistory(currentLcKey);
});
onSnapshot(collection(db,"lc"), snap => {
  allLC = snap.docs.map(d=>({id:d.id,...d.data()}));
  renderCustomerCards();
  if (currentLcKey) renderHistory(currentLcKey);
});

updateAdminUI();
