<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hệ thống Xuất Khẩu</title>
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
</head>
<body>

<div class="topbar">
  <div class="topbar-logo">Xuất Khẩu <span>System</span></div>
  <div class="topbar-nav">
    <a href="customers.html" class="btn btn-sm"><i class="ti ti-users"></i> Khách hàng</a>
    <div id="admin-indicator" class="admin-indicator" style="display:none">
      <i class="ti ti-shield-check" style="font-size:13px"></i> Admin
    </div>
    <button class="btn btn-sm" id="btn-login-toggle">
      <i class="ti ti-lock"></i> <span id="login-label">Đăng nhập</span>
    </button>
  </div>
</div>

<div class="container">
  <div class="toolbar">
    <div class="toolbar-left">
      <span id="shipment-count" style="font-size:13px;color:var(--text-muted)">Đang tải...</span>
      <select class="form-select" id="filter-status" style="width:140px;padding:6px 8px">
        <option value="">Tất cả</option>
        <option value="pending">Chờ xử lý</option>
        <option value="booking">Chờ booking</option>
        <option value="processing">Đang xử lý</option>
        <option value="done">Hoàn tất</option>
      </select>
    </div>
    <div class="toolbar-right">
      <button class="btn btn-primary" id="btn-add-shipment">
        <i class="ti ti-plus"></i> Thêm lô hàng
      </button>
    </div>
  </div>

  <div id="shipment-list">
    <div class="spinner"></div>
  </div>
</div>

<!-- MODAL: Thêm lô hàng -->
<div class="modal-backdrop" id="modal-add-shipment">
  <div class="modal">
    <div class="modal-title">
      Thêm lô hàng mới
      <span class="modal-close" onclick="closeModalById('modal-add-shipment')">
        <i class="ti ti-x"></i>
      </span>
    </div>
    <form id="form-add-shipment">
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Ngày xuất (Ngày xuất kho)</label>
          <input type="date" class="form-input" id="f-export-date">
        </div>
        <div class="form-group">
          <label class="form-label">Ship Date (Ngày tàu dự kiến) *</label>
          <input type="date" class="form-input" id="f-ship-date" required>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Nơi giao hàng (Cảng) *</label>
          <input type="text" class="form-input" id="f-port" placeholder="OSAKA, KOBE, TOKYO..." required>
        </div>
        <div class="form-group">
          <label class="form-label">Loại container *</label>
          <select class="form-select" id="f-container" required>
            <option value="">-- Chọn --</option>
            <option value="20F×1">20F×1</option>
            <option value="40F×1">40F×1</option>
            <option value="20F×2">20F×2</option>
            <option value="40F×2">40F×2</option>
            <option value="AIR">AIR</option>
            <option value="LCL">LCL</option>
          </select>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Ngày đóng hàng</label>
          <input type="date" class="form-input" id="f-stuffing-date">
        </div>
        <div class="form-group">
          <label class="form-label">Ngày cắt máng (CY Cut)</label>
          <input type="date" class="form-input" id="f-cy-cut">
        </div>
      </div>
      <div class="form-footer">
        <button type="button" class="btn" onclick="closeModalById('modal-add-shipment')">Hủy</button>
        <button type="submit" class="btn btn-primary">
          <i class="ti ti-check"></i> Tạo lô hàng
        </button>
      </div>
    </form>
  </div>
</div>

<!-- MODAL: Đăng nhập Admin -->
<div class="modal-backdrop" id="modal-login">
  <div class="modal" style="max-width:360px">
    <div class="modal-title">
      Đăng nhập Admin
      <span class="modal-close" onclick="closeModalById('modal-login')">
        <i class="ti ti-x"></i>
      </span>
    </div>
    <div class="form-group">
      <label class="form-label">Mật khẩu</label>
      <input type="password" class="form-input" id="f-admin-pw" placeholder="Nhập mật khẩu admin">
    </div>
    <div id="login-error" style="color:var(--red-text);font-size:12px;margin-bottom:8px;display:none">
      Sai mật khẩu!
    </div>
    <div class="form-footer">
      <button type="button" class="btn" onclick="closeModalById('modal-login')">Hủy</button>
      <button type="button" class="btn btn-primary" id="btn-do-login">
        <i class="ti ti-login"></i> Đăng nhập
      </button>
    </div>
  </div>
</div>

<!-- MODAL: Chi tiết / edit lô hàng -->
<div class="modal-backdrop" id="modal-edit-shipment">
  <div class="modal" style="max-width:720px">
    <div class="modal-title">
      <span id="edit-modal-title">Chi tiết lô hàng</span>
      <span class="modal-close" onclick="closeModalById('modal-edit-shipment')">
        <i class="ti ti-x"></i>
      </span>
    </div>
    <div id="edit-modal-body"></div>
  </div>
</div>

<!-- MODAL: Generate email -->
<div class="modal-backdrop" id="modal-email">
  <div class="modal" style="max-width:680px">
    <div class="modal-title">
      Email Booking
      <span class="modal-close" onclick="closeModalById('modal-email')">
        <i class="ti ti-x"></i>
      </span>
    </div>
    <div id="email-body" style="white-space:pre-wrap;font-size:13px;line-height:1.7;background:var(--bg-secondary);padding:16px;border-radius:var(--radius-md);border:0.5px solid var(--border);max-height:420px;overflow-y:auto"></div>
    <div class="form-footer">
      <button class="btn" id="btn-copy-email"><i class="ti ti-copy"></i> Copy</button>
      <button class="btn btn-primary" onclick="closeModalById('modal-email')">Đóng</button>
    </div>
  </div>
</div>

<div id="toast" class="toast"></div>

<script type="module">
import { db } from "./js/firebase-config.js";
import { isAdmin, loginAdmin, logoutAdmin } from "./js/auth.js";
import { showToast, formatDate, getProgress, getStatus, progColor, renderChecklist, CHECKLIST_STEPS, openModal, closeModal } from "./js/utils.js";
import {
  collection, addDoc, onSnapshot, doc, updateDoc, deleteDoc, serverTimestamp, query, orderBy
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

window.closeModalById = closeModal;

let allShipments = [];
let currentShipmentId = null;

function updateAdminUI() {
  const admin = isAdmin();
  document.getElementById("admin-indicator").style.display = admin ? "flex" : "none";
  document.getElementById("login-label").textContent = admin ? "Đăng xuất" : "Đăng nhập";
  document.getElementById("btn-add-shipment").style.display = admin ? "flex" : "none";
  renderList();
}

document.getElementById("btn-login-toggle").addEventListener("click", () => {
  if (isAdmin()) { logoutAdmin(); showToast("Đã đăng xuất"); updateAdminUI(); }
  else openModal("modal-login");
});

document.getElementById("btn-do-login").addEventListener("click", () => {
  const pw = document.getElementById("f-admin-pw").value;
  const err = document.getElementById("login-error");
  if (loginAdmin(pw)) {
    closeModal("modal-login");
    document.getElementById("f-admin-pw").value = "";
    err.style.display = "none";
    showToast("Đăng nhập thành công!");
    updateAdminUI();
  } else {
    err.style.display = "block";
  }
});

document.getElementById("f-admin-pw").addEventListener("keydown", e => {
  if (e.key === "Enter") document.getElementById("btn-do-login").click();
});

document.getElementById("btn-add-shipment").addEventListener("click", () => {
  if (!isAdmin()) { showToast("Cần đăng nhập Admin!"); return; }
  openModal("modal-add-shipment");
});

document.getElementById("form-add-shipment").addEventListener("submit", async e => {
  e.preventDefault();
  const shipDate = document.getElementById("f-ship-date").value;
  const port     = document.getElementById("f-port").value.trim().toUpperCase();
  const container= document.getElementById("f-container").value;
  if (!shipDate || !port || !container) return;

  try {
    await addDoc(collection(db, "shipments"), {
      exportDate:   document.getElementById("f-export-date").value || null,
      shipDate,
      port,
      container,
      stuffingDate: document.getElementById("f-stuffing-date").value || null,
      cyCut:        document.getElementById("f-cy-cut").value || null,
      vessel:       null,
      etd:          null,
      eta:          null,
      checklist:    { 1: "done" },
      orders:       [],
      createdAt:    serverTimestamp(),
    });
    closeModal("modal-add-shipment");
    e.target.reset();
    showToast("Đã tạo lô hàng!");
  } catch(err) {
    showToast("Lỗi: " + err.message);
  }
});

document.getElementById("filter-status").addEventListener("change", renderList);

function sortShipments(list) {
  return [...list].sort((a, b) => {
    const da = a.stuffingDate || a.shipDate || "9999";
    const db2 = b.stuffingDate || b.shipDate || "9999";
    if (da !== db2) return da < db2 ? -1 : 1;
    const pa = getProgress(a.checklist).pct;
    const pb = getProgress(b.checklist).pct;
    return pb - pa;
  });
}

function renderList() {
  const filterVal = document.getElementById("filter-status").value;
  const container = document.getElementById("shipment-list");
  const admin = isAdmin();

  let list = sortShipments(allShipments);

  if (filterVal) {
    list = list.filter(s => {
      const { label } = getStatus(s.checklist);
      if (filterVal === "done")       return label === "Hoàn tất";
      if (filterVal === "booking")    return label === "Chờ booking";
      if (filterVal === "processing") return label === "Đang xử lý";
      if (filterVal === "pending")    return label === "Chờ xử lý";
      return true;
    });
  }

  document.getElementById("shipment-count").textContent =
    list.length + " lô hàng · sắp theo ngày đóng hàng";

  if (list.length === 0) {
    container.innerHTML = `<div class="empty-state"><i class="ti ti-package"></i><p>Chưa có lô hàng nào</p></div>`;
    return;
  }

  container.innerHTML = "";
  list.forEach(s => container.appendChild(buildCard(s, admin)));
}

function buildCard(s, admin) {
  const { done, total, pct } = getProgress(s.checklist);
  const status = getStatus(s.checklist);
  const isAir  = s.container === "AIR";

  const card = document.createElement("div");
  card.className = "shipment-card";
  card.id = "card-" + s.id;

  const orders    = s.orders || [];
  const totalPcs  = orders.reduce((a,o) => a+(parseInt(o.qty)||0), 0);
  const totalCtns = orders.reduce((a,o) => a+(parseInt(o.ctns)||0), 0);
  const totalKg   = orders.reduce((a,o) => a+(parseFloat(o.kg)||0), 0);
  const totalCbm  = orders.reduce((a,o) => a+(parseFloat(o.cbm)||0), 0);

  card.innerHTML = `
    <div class="card-header" onclick="toggleCard('${s.id}')">
      <div class="card-row1">
        <div>
          <div class="card-title">
            ${s.port}
            <span class="badge ${isAir ? 'badge-gray' : 'badge-blue'}">${s.container}</span>
          </div>
          <div class="card-meta">
            Đóng hàng: ${formatDate(s.stuffingDate) || "—"} ·
            Ship: ${formatDate(s.shipDate)} ·
            ${orders.length} đơn hàng
          </div>
        </div>
        <div class="card-right">
          <span class="badge ${status.cls}">${status.label}</span>
          <i class="ti ti-chevron-down chevron" id="cv-${s.id}"></i>
        </div>
      </div>
      <div class="vessel-info">
        <span><i class="ti ti-${isAir ? 'plane' : 'ship'}"></i>${s.vessel || "Chưa có tàu"}</span>
        <span><i class="ti ti-calendar"></i>ETD ${formatDate(s.etd) || "—"}</span>
        <span><i class="ti ti-map-pin"></i>ETA ${formatDate(s.eta) || "—"}</span>
        <span><i class="ti ti-cut"></i>Cắt máng ${formatDate(s.cyCut) || "—"}</span>
      </div>
      <div class="checklist" id="cl-${s.id}"></div>
      <div class="progress-wrap" style="margin-top:6px">
        <span class="prog-label">${done} / ${total} bước</span>
        <div class="progress-track">
          <div class="progress-fill" style="width:${pct}%;background:${progColor(pct)}"></div>
        </div>
        <span class="prog-label">${pct}%</span>
      </div>
    </div>
    <div class="card-detail" id="detail-${s.id}">
      <div class="detail-inner">
        ${buildOrderTable(orders, s.id, admin)}
        <div class="action-row">
          ${admin ? `<button class="btn btn-sm" onclick="openAddOrder('${s.id}')"><i class="ti ti-plus"></i> Thêm đơn</button>` : ""}
          <button class="btn btn-sm" onclick="openEmailModal('${s.id}')"><i class="ti ti-mail"></i> Generate email</button>
          ${admin ? `<button class="btn btn-sm" onclick="openEditShipment('${s.id}')"><i class="ti ti-edit"></i> Sửa lô hàng</button>` : ""}
          ${admin ? `<button class="btn btn-sm btn-danger" onclick="deleteShipment('${s.id}')"><i class="ti ti-trash"></i> Xóa lô</button>` : ""}
        </div>
      </div>
    </div>`;

  const clEl = card.querySelector(`#cl-${s.id}`);
  renderChecklist(clEl, s.checklist, admin ? async (stepId, newState) => {
    const updated = { ...(s.checklist||{}), [stepId]: newState };
    await updateDoc(doc(db, "shipments", s.id), { checklist: updated });
  } : null);

  return card;
}

function buildOrderTable(orders, shipId, admin) {
  if (!orders || orders.length === 0) {
    return `<p style="font-size:12px;color:var(--text-muted);padding:8px 0">Chưa có đơn hàng. ${admin ? 'Bấm "+ Thêm đơn" để thêm.' : ''}</p>`;
  }
  const totalPcs  = orders.reduce((a,o) => a+(parseInt(o.qty)||0), 0);
  const totalCtns = orders.reduce((a,o) => a+(parseInt(o.ctns)||0), 0);
  const totalKg   = orders.reduce((a,o) => a+(parseFloat(o.kg)||0), 0);
  const totalCbm  = orders.reduce((a,o) => a+(parseFloat(o.cbm)||0), 0);

  const rows = orders.map((o, idx) => `
    <tr>
      <td>${o.customer || "—"}</td>
      <td>${o.contract || "—"}</td>
      <td>${o.index || "—"}</td>
      <td>${o.items || "—"}</td>
      <td class="qty-pcs">${(parseInt(o.qty)||0).toLocaleString()}</td>
      <td>${parseInt(o.ctns)||0}</td>
      <td>${parseFloat(o.kg)||0}</td>
      <td>${parseFloat(o.cbm)||0}</td>
      <td>${o.hsCode || "—"}</td>
      <td>${o.coForm || "—"}</td>
      ${admin ? `<td>
        <button class="btn btn-sm" onclick="openEditOrder('${shipId}',${idx})" style="padding:2px 6px"><i class="ti ti-edit" style="font-size:11px"></i></button>
        <button class="btn btn-sm btn-danger" onclick="deleteOrder('${shipId}',${idx})" style="padding:2px 6px"><i class="ti ti-trash" style="font-size:11px"></i></button>
      </td>` : ""}
    </tr>`).join("");

  return `
    <table class="data-table">
      <colgroup>
        <col style="width:80px"><col style="width:80px"><col style="width:80px"><col style="width:90px">
        <col style="width:65px"><col style="width:50px"><col style="width:55px"><col style="width:50px">
        <col style="width:65px"><col style="width:65px">
        ${admin ? '<col style="width:80px">' : ""}
      </colgroup>
      <thead><tr>
        <th>Customer</th><th>Contract</th><th>Index</th><th>Items</th>
        <th>Qty PCS</th><th>CTNs</th><th>KGs</th><th>CBM</th>
        <th>HS Code</th><th>C/O Form</th>
        ${admin ? "<th></th>" : ""}
      </tr></thead>
      <tbody>${rows}</tbody>
      <tfoot><tr>
        <td colspan="4" style="color:var(--text-muted)">Tổng (${orders.length} đơn)</td>
        <td class="qty-pcs">${totalPcs.toLocaleString()}</td>
        <td>${totalCtns}</td>
        <td>${Math.round(totalKg*10)/10}</td>
        <td>${Math.round(totalCbm*100)/100}</td>
        <td></td><td></td>
        ${admin ? "<td></td>" : ""}
      </tr></tfoot>
    </table>`;
}

window.toggleCard = function(id) {
  const detail = document.getElementById("detail-" + id);
  const cv     = document.getElementById("cv-" + id);
  const open   = detail.classList.contains("open");
  detail.classList.toggle("open", !open);
  cv.classList.toggle("open", !open);
};

window.openAddOrder = function(shipId) {
  currentShipmentId = shipId;
  openEditOrderModal(shipId, null, null);
};

window.openEditOrder = function(shipId, idx) {
  const s = allShipments.find(x => x.id === shipId);
  if (!s) return;
  openEditOrderModal(shipId, idx, s.orders[idx]);
};

function openEditOrderModal(shipId, idx, order) {
  const isEdit = order !== null;
  const o = order || {};
  const prevCbm = o.cbm || "";
  const prevD = o.dimL || ""; const prevW = o.dimW || ""; const prevH = o.dimH || "";

  document.getElementById("edit-modal-title").textContent = isEdit ? "Sửa đơn hàng" : "Thêm đơn hàng";
  document.getElementById("edit-modal-body").innerHTML = `
    <form id="form-order">
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Khách hàng</label>
          <input class="form-input" id="fo-customer" value="${o.customer||""}" placeholder="TOYOTSU, FLEX JAPAN...">
        </div>
        <div class="form-group">
          <label class="form-label">Hợp đồng (Contract)</label>
          <input class="form-input" id="fo-contract" value="${o.contract||""}">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Index (Đơn hàng)</label>
          <input class="form-input" id="fo-index" value="${o.index||""}">
        </div>
        <div class="form-group">
          <label class="form-label">Items (Mã hàng)</label>
          <input class="form-input" id="fo-items" value="${o.items||""}">
        </div>
      </div>
      <div class="form-row-3">
        <div class="form-group">
          <label class="form-label">Qty (PCS)</label>
          <input type="number" class="form-input" id="fo-qty" value="${o.qty||""}">
        </div>
        <div class="form-group">
          <label class="form-label">Số thùng (CTNs)</label>
          <input type="number" class="form-input" id="fo-ctns" value="${o.ctns||""}">
        </div>
        <div class="form-group">
          <label class="form-label">KGs (tổng)</label>
          <input type="number" class="form-input" id="fo-kg" value="${o.kg||""}" step="0.1">
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Kích thước thùng (mm): Dài × Rộng × Cao
          <span style="float:right;cursor:pointer;color:var(--blue-text);font-size:11px" id="btn-copy-dim">Copy từ trên</span>
        </label>
        <div style="display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:8px;align-items:center">
          <input type="number" class="form-input" id="fo-diml" value="${prevD}" placeholder="Dài" oninput="calcCbm()">
          <input type="number" class="form-input" id="fo-dimw" value="${prevW}" placeholder="Rộng" oninput="calcCbm()">
          <input type="number" class="form-input" id="fo-dimh" value="${prevH}" placeholder="Cao" oninput="calcCbm()">
          <div>
            <label class="form-label" style="margin-bottom:4px">CBM</label>
            <input type="number" class="form-input" id="fo-cbm" value="${prevCbm}" step="0.01" placeholder="tự tính">
          </div>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">HS Code</label>
          <input class="form-input" id="fo-hscode" value="${o.hsCode||""}">
        </div>
        <div class="form-group">
          <label class="form-label">C/O Form</label>
          <select class="form-select" id="fo-coform">
            <option value="">-- Chọn --</option>
            ${["RCEP","AJ","AI","VK","VJ","EUR.1","CO-D"].map(v =>
              `<option value="${v}" ${o.coForm===v?"selected":""}>${v}</option>`
            ).join("")}
          </select>
        </div>
      </div>
      <div class="form-footer">
        <button type="button" class="btn" onclick="closeModalById('modal-edit-shipment')">Hủy</button>
        <button type="submit" class="btn btn-primary"><i class="ti ti-check"></i> ${isEdit ? "Lưu" : "Thêm"}</button>
      </div>
    </form>`;

  window.calcCbm = function() {
    const d = parseFloat(document.getElementById("fo-diml").value)||0;
    const w = parseFloat(document.getElementById("fo-dimw").value)||0;
    const h = parseFloat(document.getElementById("fo-dimh").value)||0;
    if (d && w && h) {
      document.getElementById("fo-cbm").value = Math.round(d*w*h/10000)/100;
    }
  };

  document.getElementById("btn-copy-dim").addEventListener("click", () => {
    const s = allShipments.find(x => x.id === shipId);
    if (!s || !s.orders || s.orders.length === 0) return;
    const lastOrder = idx !== null ? (idx > 0 ? s.orders[idx-1] : s.orders[0]) : s.orders[s.orders.length-1];
    if (lastOrder) {
      document.getElementById("fo-diml").value = lastOrder.dimL || "";
      document.getElementById("fo-dimw").value = lastOrder.dimW || "";
      document.getElementById("fo-dimh").value = lastOrder.dimH || "";
      window.calcCbm();
    }
  });

  document.getElementById("form-order").addEventListener("submit", async e => {
    e.preventDefault();
    const newOrder = {
      customer: document.getElementById("fo-customer").value.trim(),
      contract: document.getElementById("fo-contract").value.trim(),
      index:    document.getElementById("fo-index").value.trim(),
      items:    document.getElementById("fo-items").value.trim(),
      qty:      parseInt(document.getElementById("fo-qty").value)||0,
      ctns:     parseInt(document.getElementById("fo-ctns").value)||0,
      kg:       parseFloat(document.getElementById("fo-kg").value)||0,
      dimL:     parseFloat(document.getElementById("fo-diml").value)||0,
      dimW:     parseFloat(document.getElementById("fo-dimw").value)||0,
      dimH:     parseFloat(document.getElementById("fo-dimh").value)||0,
      cbm:      parseFloat(document.getElementById("fo-cbm").value)||0,
      hsCode:   document.getElementById("fo-hscode").value.trim(),
      coForm:   document.getElementById("fo-coform").value,
    };
    const s = allShipments.find(x => x.id === shipId);
    const orders = [...(s.orders||[])];
    if (isEdit) orders[idx] = newOrder;
    else orders.push(newOrder);
    await updateDoc(doc(db, "shipments", shipId), { orders });
    closeModal("modal-edit-shipment");
    showToast(isEdit ? "Đã cập nhật đơn hàng!" : "Đã thêm đơn hàng!");
  });

  openModal("modal-edit-shipment");
}

window.deleteOrder = async function(shipId, idx) {
  if (!confirm("Xóa đơn hàng này?")) return;
  const s = allShipments.find(x => x.id === shipId);
  const orders = [...(s.orders||[])];
  orders.splice(idx, 1);
  await updateDoc(doc(db, "shipments", shipId), { orders });
  showToast("Đã xóa đơn hàng!");
};

window.deleteShipment = async function(id) {
  if (!confirm("Xóa toàn bộ lô hàng này? Không thể hoàn tác!")) return;
  await deleteDoc(doc(db, "shipments", id));
  showToast("Đã xóa lô hàng!");
};

window.openEditShipment = function(id) {
  const s = allShipments.find(x => x.id === id);
  if (!s) return;
  document.getElementById("edit-modal-title").textContent = "Sửa thông tin lô hàng";
  document.getElementById("edit-modal-body").innerHTML = `
    <form id="form-edit-ship">
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Ngày xuất</label>
          <input type="date" class="form-input" id="es-export-date" value="${s.exportDate||""}">
        </div>
        <div class="form-group">
          <label class="form-label">Ship Date *</label>
          <input type="date" class="form-input" id="es-ship-date" value="${s.shipDate||""}" required>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Cảng *</label>
          <input class="form-input" id="es-port" value="${s.port||""}" required>
        </div>
        <div class="form-group">
          <label class="form-label">Container</label>
          <select class="form-select" id="es-container">
            ${["20F×1","40F×1","20F×2","40F×2","AIR","LCL"].map(v =>
              `<option value="${v}" ${s.container===v?"selected":""}>${v}</option>`
            ).join("")}
          </select>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Ngày đóng hàng</label>
          <input type="date" class="form-input" id="es-stuffing" value="${s.stuffingDate||""}">
        </div>
        <div class="form-group">
          <label class="form-label">Ngày cắt máng</label>
          <input type="date" class="form-input" id="es-cycut" value="${s.cyCut||""}">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Tên tàu / Hãng bay</label>
          <input class="form-input" id="es-vessel" value="${s.vessel||""}" placeholder="MOL TRIUMPH, Vietnam Airlines...">
        </div>
        <div class="form-group">
          <label class="form-label">ETD (Ngày tàu đi)</label>
          <input type="date" class="form-input" id="es-etd" value="${s.etd||""}">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">ETA (Ngày tàu đến)</label>
          <input type="date" class="form-input" id="es-eta" value="${s.eta||""}">
        </div>
        <div class="form-group"></div>
      </div>
      <div class="form-footer">
        <button type="button" class="btn" onclick="closeModalById('modal-edit-shipment')">Hủy</button>
        <button type="submit" class="btn btn-primary"><i class="ti ti-check"></i> Lưu</button>
      </div>
    </form>`;

  document.getElementById("form-edit-ship").addEventListener("submit", async e => {
    e.preventDefault();
    await updateDoc(doc(db, "shipments", id), {
      exportDate:   document.getElementById("es-export-date").value || null,
      shipDate:     document.getElementById("es-ship-date").value,
      port:         document.getElementById("es-port").value.trim().toUpperCase(),
      container:    document.getElementById("es-container").value,
      stuffingDate: document.getElementById("es-stuffing").value || null,
      cyCut:        document.getElementById("es-cycut").value || null,
      vessel:       document.getElementById("es-vessel").value.trim() || null,
      etd:          document.getElementById("es-etd").value || null,
      eta:          document.getElementById("es-eta").value || null,
    });
    closeModal("modal-edit-shipment");
    showToast("Đã cập nhật lô hàng!");
  });

  openModal("modal-edit-shipment");
};

window.openEmailModal = async function(shipId) {
  const s = allShipments.find(x => x.id === shipId);
  if (!s) return;

  let customerName = "—"; let contactPerson = "—"; let consigneeName = "—";
  let consigneeAddr = "—"; let description = "SHIRTS"; let emailNote = "";

  const firstOrder = (s.orders||[])[0];
  if (firstOrder?.customer) {
    try {
      const { collection: col, query: q, where, getDocs } = await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js");
      const snap = await getDocs(q(col(db, "customers"), where("name", "==", firstOrder.customer)));
      if (!snap.empty) {
        const c = snap.docs[0].data();
        contactPerson = c.contactPerson || "—";
        consigneeName = c.consigneeName || "—";
        consigneeAddr = c.consigneeAddr || "—";
        description   = c.description  || "SHIRTS";
        emailNote     = c.note         || "";
      }
    } catch(e) {}
  }

  const contracts = [...new Set((s.orders||[]).map(o => o.contract).filter(Boolean))].join(", ");
  const totalPcs  = (s.orders||[]).reduce((a,o) => a+(parseInt(o.qty)||0), 0);
  const totalCtns = (s.orders||[]).reduce((a,o) => a+(parseInt(o.ctns)||0), 0);
  const totalKg   = Math.round((s.orders||[]).reduce((a,o) => a+(parseFloat(o.kg)||0), 0));
  const totalCbm  = Math.round((s.orders||[]).reduce((a,o) => a+(parseFloat(o.cbm)||0), 0)*100)/100;

  const etdStr = s.etd ? new Date(s.etd).toLocaleDateString("en-US",{month:"short",day:"2-digit",year:"numeric"}).toUpperCase() : "???";
  const contType = s.container || "???";

  const emailText =
`Dear ${contactPerson},

Please arrange for our NEW FCL BOOKING as follows!

${contType} TO ${s.port}, JAPAN:

ETD: ~ ${etdStr}  TO: ${s.port}: ETA:???  VESSEL: AS YOUR ARRANGEMENT

Description: ${description}
Contract number: ${contracts}
Quantity: ${totalPcs.toLocaleString()} pcs = (about) ${totalCtns} cartons = (about) ${totalKg} kgs = (about) ${totalCbm} cbm

Consignee: ${consigneeName}
           ${consigneeAddr}
${emailNote ? "\nNote: " + emailNote : ""}

Best regards,`;

  document.getElementById("email-body").textContent = emailText;
  openModal("modal-email");
};

document.getElementById("btn-copy-email").addEventListener("click", () => {
  navigator.clipboard.writeText(document.getElementById("email-body").textContent);
  showToast("Đã copy email!");
});

const q = query(collection(db, "shipments"), orderBy("createdAt", "desc"));
onSnapshot(q, snapshot => {
  allShipments = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
  renderList();
});

updateAdminUI();
</script>
</body>
</html>
