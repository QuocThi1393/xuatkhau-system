<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forwarder · Xuất Khẩu System</title>
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
</head>
<body>

<div class="topbar">
  <div class="topbar-logo"><a href="index.html">Xuất Khẩu <span>System</span></a></div>
  <a href="index.html" title="Về trang chủ" style="flex-shrink:0;line-height:0">
  <svg width="280" height="52" viewBox="0 0 280 52">
    <defs><linearGradient id="tosgrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#155A2C"/><stop offset="100%" stop-color="#2E9E54"/>
    </linearGradient></defs>
    <rect x="0" y="2" width="280" height="48" rx="8" fill="url(#tosgrad)"/>
    <text x="140" y="28" font-family="'Trebuchet MS', Arial, sans-serif" font-size="26" font-weight="bold" fill="#FFFFFF" text-anchor="middle" letter-spacing="2">TOSGAMEX</text>
    <text x="140" y="43" font-family="Arial, sans-serif" font-size="8" fill="#D4EDDA" text-anchor="middle" letter-spacing="1.5">TOMIYA SUMMIT GARMENT EXPORT</text>
  </svg></a>
  <div class="topbar-nav">
    <a href="index.html" class="btn btn-sm"><i class="ti ti-package"></i> Lô hàng</a>
    <a href="customers.html" class="btn btn-sm"><i class="ti ti-users"></i> Khách hàng</a>
    <div id="admin-indicator" class="admin-indicator" style="display:none">
      <i class="ti ti-shield-check" style="font-size:13px"></i> Admin
    </div>
    <button class="btn btn-sm" id="btn-login-toggle">
      <i class="ti ti-lock"></i> <span id="login-label">Đăng nhập</span>
    </button>
  </div>
</div>

<div class="container">
  <div class="toolbar">
    <div class="toolbar-left">
      <span id="fwd-count" style="font-size:13px;color:var(--text-muted)">Đang tải...</span>
    </div>
    <div class="toolbar-right">
      <button class="btn btn-primary" id="btn-add-fwd"><i class="ti ti-plus"></i> Thêm Forwarder</button>
    </div>
  </div>
  <div id="fwd-list"><div class="spinner"></div></div>
</div>

<!-- MODAL: Thêm/sửa Forwarder -->
<div class="modal-backdrop" id="modal-fwd">
  <div class="modal">
    <div class="modal-title">
      <span id="fwd-modal-title">Thêm Forwarder</span>
      <span class="modal-close" onclick="closeModalById('modal-fwd')"><i class="ti ti-x"></i></span>
    </div>
    <form id="form-fwd">
      <div class="form-group">
        <label class="form-label">Tên Forwarder (keyword) *</label>
        <input class="form-input" id="ff-name" placeholder="SITC, ONE, MAERSK..." required>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Email Booking (→ Mail To)</label>
          <input class="form-input" id="ff-mailbooking" placeholder="booking@fwd.com">
        </div>
        <div class="form-group">
          <label class="form-label">Email làm Doc (→ Mail CC)</label>
          <input class="form-input" id="ff-maildoc" placeholder="doc@fwd.com">
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Thông tin Forwarder (tên + địa chỉ + SĐT) — nhập tay</label>
        <textarea class="form-input" id="ff-info" rows="3" placeholder="VD: SITC VIETNAM CO., LTD&#10;123 Nguyen Van A, Q1, HCM&#10;Tel: 028 1234 5678"></textarea>
      </div>
      <div class="form-group">
        <label class="form-label">Liên kết khách hàng (chọn nhiều)</label>
        <div id="ff-customers" style="display:flex;flex-wrap:wrap;gap:8px;padding:10px;border:0.5px solid var(--border-md);border-radius:var(--radius-md);max-height:160px;overflow-y:auto"></div>
      </div>
      <div class="form-footer">
        <button type="button" class="btn" onclick="closeModalById('modal-fwd')">Hủy</button>
        <button type="submit" class="btn btn-primary"><i class="ti ti-check"></i> Lưu</button>
      </div>
    </form>
  </div>
</div>

<!-- MODAL: Đăng nhập -->
<div class="modal-backdrop" id="modal-login">
  <div class="modal" style="max-width:360px">
    <div class="modal-title">Đăng nhập Admin
      <span class="modal-close" onclick="closeModalById('modal-login')"><i class="ti ti-x"></i></span>
    </div>
    <div class="form-group"><label class="form-label">Mật khẩu</label>
      <input type="password" class="form-input" id="f-admin-pw"></div>
    <div id="login-error" style="color:var(--red-text);font-size:12px;margin-bottom:8px;display:none">Sai mật khẩu!</div>
    <div class="form-footer">
      <button type="button" class="btn" onclick="closeModalById('modal-login')">Hủy</button>
      <button type="button" class="btn btn-primary" id="btn-do-login"><i class="ti ti-login"></i> Đăng nhập</button>
    </div>
  </div>
</div>

<div style="position:fixed;right:10px;bottom:6px;font-size:11px;color:#9a9a9a;z-index:5;pointer-events:none">© 2026 Nguyen Quoc Thi. All rights reserved. (Version 1.0.0)</div>
<div id="toast" class="toast"></div>

<script type="module">
import { db } from "./js/firebase-config.js";
import { isAdmin, isLoggedIn, logout, onAuthChange } from "./js/auth.js";
import { showToast, openModal, closeModal } from "./js/utils.js";
import {
  collection, addDoc, onSnapshot, doc, updateDoc, deleteDoc, serverTimestamp, query, orderBy
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

window.closeModalById = closeModal;
let allFwd = [], allCustomers = [], editingId = null;

function updateAdminUI() {
  const admin = isAdmin();
  document.getElementById("admin-indicator").style.display = admin ? "flex" : "none";
  document.getElementById("login-label").textContent = admin ? "Đăng xuất" : "Đăng nhập";
  document.getElementById("btn-add-fwd").style.display = admin ? "flex" : "none";
  renderList();
}
document.getElementById("btn-login-toggle").addEventListener("click", async () => {
  if (isLoggedIn()) { await logout(); location.href = "index.html"; }
  else location.href = "index.html";   // Đăng nhập tại trang chủ
});

function renderCustomerCheckboxes(selected=[]) {
  const box = document.getElementById("ff-customers");
  if (!allCustomers.length) { box.innerHTML = `<span style="font-size:12px;color:var(--text-muted)">Chưa có khách hàng nào</span>`; return; }
  box.innerHTML = allCustomers.map(c => `
    <label style="display:flex;align-items:center;gap:5px;font-size:12px;cursor:pointer;padding:4px 8px;border:0.5px solid var(--border);border-radius:var(--radius-md)">
      <input type="checkbox" value="${c.name}" ${selected.includes(c.name)?"checked":""}> ${c.name}
    </label>`).join("");
}

document.getElementById("btn-add-fwd").addEventListener("click", () => {
  editingId = null;
  document.getElementById("fwd-modal-title").textContent = "Thêm Forwarder";
  document.getElementById("form-fwd").reset();
  renderCustomerCheckboxes([]);
  openModal("modal-fwd");
});

document.getElementById("form-fwd").addEventListener("submit", async e => {
  e.preventDefault();
  const linked = [...document.querySelectorAll('#ff-customers input:checked')].map(i=>i.value);
  const data = {
    name: document.getElementById("ff-name").value.trim(),
    mailBooking: document.getElementById("ff-mailbooking").value.trim(),
    mailDoc: document.getElementById("ff-maildoc").value.trim(),
    info: document.getElementById("ff-info").value.trim(),
    customers: linked,
  };
  try {
    if (editingId) { await updateDoc(doc(db,"forwarders",editingId), data); showToast("Đã cập nhật!"); }
    else {
      const dup = allFwd.find(f=>(f.name||"").toLowerCase()===data.name.toLowerCase());
      if (dup) { showToast("Tên forwarder đã tồn tại!"); return; }
      await addDoc(collection(db,"forwarders"), {...data, createdAt: serverTimestamp()});
      showToast("Đã thêm!");
    }
    closeModal("modal-fwd"); e.target.reset(); editingId = null;
  } catch(err){ showToast("Lỗi: "+err.message); }
});

function renderList() {
  const admin = isAdmin();
  document.getElementById("fwd-count").textContent = allFwd.length + " forwarder";
  const cont = document.getElementById("fwd-list");
  if (!allFwd.length) { cont.innerHTML = `<div class="empty-state"><i class="ti ti-truck-delivery"></i><p>Chưa có forwarder nào</p></div>`; return; }
  cont.innerHTML = "";
  allFwd.forEach(f => {
    const card = document.createElement("div");
    card.className = "shipment-card";
    card.innerHTML = `
      <div style="padding:14px 16px">
        <div style="display:flex;justify-content:space-between;align-items:flex-start">
          <div style="font-size:15px;font-weight:500">${f.name}</div>
          ${admin?`<div style="display:flex;gap:6px">
            <button class="btn btn-sm" onclick="editFwd('${f.id}')"><i class="ti ti-edit"></i></button>
            <button class="btn btn-sm btn-danger" onclick="deleteFwd('${f.id}')"><i class="ti ti-trash"></i></button>
          </div>`:""}
        </div>
        <div style="margin-top:8px;font-size:12px;color:var(--text-muted)">
          <div><b>Email Booking (To):</b> ${f.mailBooking||"—"}</div>
          <div><b>Email Doc (CC):</b> ${f.mailDoc||"—"}</div>
          ${f.info?`<div style="margin-top:4px;white-space:pre-line"><b>Thông tin:</b> ${f.info.replace(/</g,"&lt;")}</div>`:""}
        </div>
        <div style="margin-top:8px;font-size:11px">
          <b style="color:var(--text-muted)">Khách hàng liên kết:</b>
          ${(f.customers||[]).length ? (f.customers||[]).map(c=>`<span class="badge badge-blue" style="margin:2px">${c}</span>`).join("") : '<span style="color:var(--text-muted)">—</span>'}
        </div>
      </div>`;
    cont.appendChild(card);
  });
}

window.editFwd = function(id) {
  const f = allFwd.find(x=>x.id===id);
  if (!f) return;
  editingId = id;
  document.getElementById("fwd-modal-title").textContent = "Sửa Forwarder";
  document.getElementById("ff-name").value = f.name||"";
  document.getElementById("ff-mailbooking").value = f.mailBooking||"";
  document.getElementById("ff-maildoc").value = f.mailDoc||"";
  document.getElementById("ff-info").value = f.info||"";
  renderCustomerCheckboxes(f.customers||[]);
  openModal("modal-fwd");
};

window.deleteFwd = async function(id) {
  if (!confirm("Xóa forwarder này?")) return;
  await deleteDoc(doc(db,"forwarders",id));
  showToast("Đã xóa!");
};

// Load customers (cho checkbox) + forwarders — chỉ khi đã đăng nhập
let _unsub1=null,_unsub2=null;
function startData() {
  if (_unsub1) return;
  _unsub1 = onSnapshot(query(collection(db,"customers"), orderBy("name")), snap => {
    allCustomers = snap.docs.map(d=>({id:d.id,...d.data()}));
  }, err => { console.warn("Firestore:", err.message); });
  _unsub2 = onSnapshot(query(collection(db,"forwarders"), orderBy("name")), snap => {
    allFwd = snap.docs.map(d=>({id:d.id,...d.data()}));
    renderList();
  }, err => { console.warn("Firestore:", err.message); });
}

onAuthChange(user => {
  if (!user) { location.href = "index.html"; return; }
  updateAdminUI();
  startData();
});
</script>
</body>
</html>
